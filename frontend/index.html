<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TTB Label Verification</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <main class="page">
      <header class="page-header">
        <p class="eyebrow" id="mode-eyebrow">Single Label Check</p>
        <h1>TTB Label Verification</h1>
        <p class="status-line" id="status-line" role="status" aria-live="polite">Ready to check one label.</p>
      </header>

      <nav class="mode-switch" aria-label="Verification mode">
        <button id="single-mode-button" class="mode-button active" type="button" aria-pressed="true">
          Single Label
        </button>
        <button id="batch-mode-button" class="mode-button" type="button" aria-pressed="false">
          Batch Upload
        </button>
      </nav>

      <section class="workspace" aria-label="Label verification form">
        <form id="verify-form" class="verify-form mode-panel" novalidate>
          <div class="image-picker">
            <label for="image">Label Image</label>
            <input
              id="image"
              name="image"
              type="file"
              accept="image/jpeg,image/png,image/webp"
              aria-describedby="selected-file"
              required
            >
            <p id="selected-file" class="selected-file">No image selected</p>
            <img id="image-preview" class="image-preview" alt="Selected label preview" hidden>
          </div>

          <div class="fields-grid">
            <div class="field">
              <label for="brand_name">Brand Name</label>
              <input id="brand_name" name="brand_name" type="text" autocomplete="off" required>
            </div>

            <div class="field">
              <label for="class_type">Class / Type</label>
              <input id="class_type" name="class_type" type="text" autocomplete="off" required>
            </div>

            <div class="field">
              <label for="producer_name">Producer Name</label>
              <input id="producer_name" name="producer_name" type="text" autocomplete="off" required>
            </div>

            <div class="field">
              <label for="country_of_origin">Country of Origin</label>
              <input id="country_of_origin" name="country_of_origin" type="text" autocomplete="off" required>
            </div>

            <div class="field">
              <label for="alcohol_by_volume">Alcohol by Volume</label>
              <input id="alcohol_by_volume" name="alcohol_by_volume" type="text" autocomplete="off" required>
            </div>

            <div class="field">
              <label for="net_contents">Net Contents</label>
              <input id="net_contents" name="net_contents" type="text" autocomplete="off" required>
            </div>

            <div class="field field-wide">
              <label for="government_warning">Government Warning</label>
              <textarea id="government_warning" name="government_warning" rows="7" required></textarea>
            </div>
          </div>

          <div id="error-box" class="error-box" role="alert" tabindex="-1" hidden></div>

          <button id="submit-button" class="primary-button" type="submit">Verify Label</button>
          <p id="loading-message" class="loading-message" role="status" aria-live="polite" hidden>
            Checking the label. This usually takes a few seconds.
          </p>
        </form>

        <section id="results" class="results" aria-live="polite" tabindex="-1" hidden></section>

        <form id="batch-form" class="verify-form mode-panel" novalidate hidden>
          <div class="image-picker">
            <label for="batch-images">Label Images</label>
            <input
              id="batch-images"
              name="images"
              type="file"
              accept="image/jpeg,image/png,image/webp"
              aria-describedby="batch-selected-files"
              multiple
              required
            >
            <p id="batch-selected-files" class="selected-file">No images selected</p>
          </div>

          <div id="batch-list" class="batch-list"></div>

          <div id="batch-error-box" class="error-box" role="alert" tabindex="-1" hidden></div>

          <button id="batch-submit-button" class="primary-button" type="submit">Verify Batch</button>
          <p id="batch-loading-message" class="loading-message" role="status" aria-live="polite" hidden>
            Checking labels...
          </p>
          <div id="batch-progress-panel" class="progress-panel" role="status" aria-live="polite" hidden>
            <div class="spinner" aria-hidden="true"></div>
            <p>Checking labels. This can take a few seconds.</p>
          </div>
        </form>

        <section id="batch-results" class="results" aria-live="polite" tabindex="-1" hidden></section>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
